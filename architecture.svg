    <text x="794" y="76" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b5cf6">KPIs · SHAP · live feed</text>
  </g>
  <g class="b6">
    <rect x="707" y="96" width="174" height="36" rx="5" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width=".5"/>
    <text x="794" y="119" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">/transactions</text>
  </g>
  <g class="b7">
    <rect x="707" y="146" width="174" height="36" rx="5" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width=".5"/>
    <text x="794" y="169" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">/network  3D force graph</text>
  </g>
  <g class="b8">
    <rect x="707" y="196" width="174" height="36" rx="5" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width=".5"/>
    <text x="794" y="219" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">/models  promote · rollback</text>
  </g>
  <g class="b9">
    <rect x="707" y="246" width="174" height="36" rx="5" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width=".5"/>
    <text x="794" y="269" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">/monitoring  Evidently</text>
  </g>
  <!-- ARROWS -->
  <!-- gen -> producer -->
  <line x1="106" y1="86" x2="106" y2="100" stroke="#3b82f6" stroke-width="1" class="fl"/>
  <!-- producer -> redpanda -->
  <line x1="106" y1="140" x2="106" y2="154" stroke="#3b82f6" stroke-width="1" class="fl"/>
  <!-- redpanda -> consumer -->
  <line x1="106" y1="194" x2="106" y2="208" stroke="#ef4444" stroke-width="1" class="fl"/>
  <!-- consumer -> fastapi -->
  <path d="M190 228 Q207 228 207 70 L227 70" stroke="#3b82f6" stroke-width="1" fill="none" class="fl"/>
  <!-- inference chain -->
  <line x1="341" y1="94" x2="341" y2="108" stroke="#14b8a6" stroke-width="1" class="fl"/>
  <line x1="341" y1="144" x2="341" y2="154" stroke="#14b8a6" stroke-width="1" class="fl"/>
  <line x1="341" y1="190" x2="341" y2="200" stroke="#14b8a6" stroke-width="1" class="fl"/>
  <line x1="341" y1="236" x2="341" y2="246" stroke="#14b8a6" stroke-width="1" class="fl"/>
  <line x1="281" y1="282" x2="281" y2="296" stroke="#64748b" stroke-width=".7" class="fl"/>
  <line x1="401" y1="282" x2="401" y2="296" stroke="#64748b" stroke-width=".7" class="fl"/>
  <!-- fastapi -> evidently (reads postgres) -->
  <path d="M455 314 Q470 314 470 66 L492 66" stroke="#64748b" stroke-width=".7" fill="none" class="fl" stroke-dasharray="5 3"/>
  <!-- evidently -> celery -->
  <line x1="581" y1="86" x2="581" y2="100" stroke="#f59e0b" stroke-width="1" class="fl"/>
  <!-- celery -> mlflow -->
  <line x1="581" y1="140" x2="581" y2="154" stroke="#f59e0b" stroke-width="1" class="fl"/>
  <!-- retrain loop -->
  <path d="M492 120 Q460 120 460 80 Q460 46 492 46" stroke="#f59e0b" stroke-width=".8" fill="none" stroke-dasharray="5 3" class="fl"/>
  <!-- fastapi -> dashboard (ws) -->
  <path d="M455 70 Q680 70 707 114" stroke="#8b5cf6" stroke-width=".8" fill="none" stroke-dasharray="5 3" class="fl"/>
  <!-- bottom label -->
  <text x="450" y="408" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155" letter-spacing="2">15 DOCKER SERVICES · SINGLE docker compose up --build</text>
</svg>