<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <style>
      @keyframes rowIn{0%{opacity:0;transform:translateX(-8px)}100%{opacity:1;transform:translateX(0)}}
      .r0{animation:rowIn .35s .05s both}
      .r1{animation:rowIn .35s .15s both}
      .r2{animation:rowIn .35s .25s both}
      .r3{animation:rowIn .35s .35s both}
      .r4{animation:rowIn .35s .45s both}
      .r5{animation:rowIn .35s .55s both}
      .r6{animation:rowIn .35s .65s both}
    </style>
  </defs>
  <rect width="900" height="320" fill="#070d18"/>
  <!-- header -->
  <rect x="0" y="0" width="900" height="36" fill="rgba(255,255,255,0.025)"/>
  <text x="30" y="23" font-family="monospace" font-size="10" fill="#475569" letter-spacing="2">CATEGORY</text>
  <text x="220" y="23" font-family="monospace" font-size="10" fill="#475569" letter-spacing="2">FEATURES (20 TOTAL)</text>
  <text x="700" y="23" font-family="monospace" font-size="10" fill="#475569" letter-spacing="2">SOURCE</text>
  <line x1="0" y1="36" x2="900" y2="36" stroke="rgba(100,160,255,0.12)" stroke-width=".5"/>
  <!-- rows -->
  <g class="r0">
    <rect x="0" y="36" width="900" height="40" fill="rgba(59,130,246,0.04)"/>
    <rect x="16" y="44" width="8" height="8" rx="2" fill="rgba(59,130,246,0.4)"/>
    <text x="34" y="58" font-family="monospace" font-size="10" fill="#93c5fd">Transaction</text>
    <text x="220" y="51" font-family="monospace" font-size="9" fill="#64748b">amount</text>
    <text x="220" y="66" font-family="monospace" font-size="9" fill="#64748b">amount_log · amount_zscore</text>
    <text x="700" y="58" font-family="monospace" font-size="9" fill="#475569">request body</text>
    <line x1="0" y1="76" x2="900" y2="76" stroke="rgba(255,255,255,0.04)" stroke-width=".5"/>
  </g>
  <g class="r1">
    <rect x="0" y="76" width="900" height="40" fill="rgba(20,184,166,0.03)"/>
