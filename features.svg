    <text x="220" y="131" font-family="monospace" font-size="9" fill="#64748b">sender_unique_receivers_1h</text>
    <text x="220" y="146" font-family="monospace" font-size="9" fill="#64748b">sender_unique_devices_24h</text>
    <text x="700" y="138" font-family="monospace" font-size="9" fill="#475569">Redis direct</text>
