    <text x="220" y="91" font-family="monospace" font-size="9" fill="#64748b">txn_count_5min / 1h / 24h</text>
    <text x="220" y="106" font-family="monospace" font-size="9" fill="#64748b">amount_velocity_5min / 1h / 24h</text>
    <text x="700" y="98" font-family="monospace" font-size="9" fill="#475569">Redis direct</text>
    <line x1="0" y1="116" x2="900" y2="116" stroke="rgba(255,255,255,0.04)" stroke-width=".5"/>
  </g>
  <g class="r2">
    <rect x="0" y="116" width="900" height="40" fill="rgba(59,130,246,0.04)"/>
    <rect x="16" y="124" width="8" height="8" rx="2" fill="rgba(139,92,246,0.5)"/>
