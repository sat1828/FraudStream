    <text x="220" y="211" font-family="monospace" font-size="9" fill="#64748b">is_new_receiver · receiver_txn_count_1h</text>
    <text x="220" y="226" font-family="monospace" font-size="9" fill="#64748b">is_night_txn · is_festival_day</text>
    <text x="700" y="218" font-family="monospace" font-size="9" fill="#475569">on-demand</text>
    <line x1="0" y1="236" x2="900" y2="236" stroke="rgba(255,255,255,0.04)" stroke-width=".5"/>
  </g>
  <g class="r5">
    <rect x="0" y="236" width="900" height="40" fill="rgba(20,184,166,0.03)"/>
    <rect x="16" y="244" width="8" height="8" rx="2" fill="rgba(34,197,94,0.4)"/>
    <text x="34" y="258" font-family="monospace" font-size="10" fill="#86efac">Temporal</text>
    <text x="220" y="251" font-family="monospace" font-size="9" fill="#64748b">hour_of_day</text>
    <text x="220" y="266" font-family="monospace" font-size="9" fill="#64748b">day_of_week</text>
    <text x="700" y="258" font-family="monospace" font-size="9" fill="#475569">request body</text>
    <line x1="0" y1="276" x2="900" y2="276" stroke="rgba(255,255,255,0.04)" stroke-width=".5"/>
  </g>
  <g class="r6">
    <rect x="0" y="276" width="900" height="40" fill="rgba(59,130,246,0.04)"/>
    <rect x="16" y="284" width="8" height="8" rx="2" fill="rgba(167,139,250,0.5)"/>
    <text x="34" y="298" font-family="monospace" font-size="10" fill="#c4b5fd">On-demand</text>
    <text x="220" y="291" font-family="monospace" font-size="9" fill="#64748b">is_high_value · is_round_amount</text>
    <text x="220" y="306" font-family="monospace" font-size="9" fill="#64748b">is_just_under (49k rule)</text>
    <text x="700" y="298" font-family="monospace" font-size="9" fill="#475569">Feast on-demand</text>
  </g>
