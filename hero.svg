<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      @keyframes fadeUp{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:translateY(0)}}
      @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(400%)}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
      @keyframes pulse{0%,100%{r:4}50%{r:6.5}}
      @keyframes dash{to{stroke-dashoffset:-40}}
      .t1{animation:fadeUp .6s .1s both}
      .t2{animation:fadeUp .6s .35s both}
      .t3{animation:fadeUp .6s .55s both}
      .t4{animation:fadeUp .6s .75s both}
      .sc{animation:scanline 3s linear infinite}
      .bk{animation:blink 1.4s infinite}
      .p1{animation:pulse 2s .2s infinite}
      .p2{animation:pulse 2s .7s infinite}
      .p3{animation:pulse 2s 1.1s infinite}
      .dk{animation:dash 1s linear infinite}
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050b14"/>
      <stop offset="100%" stop-color="#091524"/>
    </linearGradient>
    <clipPath id="cp"><rect width="900" height="220"/></clipPath>
  </defs>
  <rect width="900" height="220" fill="url(#bg)"/>
  <!-- grid lines -->
  <g opacity=".07" stroke="#4488cc" stroke-width=".5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/>
    <line x1="800" y1="0" x2="800" y2="220"/>
  </g>
  <!-- scan line overlay -->
  <g clip-path="url(#cp)">
    <rect class="sc" x="0" y="0" width="900" height="3" fill="rgba(59,130,246,0.06)"/>
  </g>
  <!-- left decorative circuit nodes -->
  <circle cx="42" cy="60" r="3" fill="#1d4ed8" opacity=".6"/>
  <circle cx="42" cy="110" r="3" fill="#1d4ed8" opacity=".6"/>
  <circle cx="42" cy="160" r="3" fill="#ef4444" opacity=".6"/>
  <line x1="42" y1="60" x2="42" y2="160" stroke="#1d4ed8" stroke-width=".7" opacity=".3" stroke-dasharray="4 3" class="dk"/>
  <line x1="42" y1="110" x2="80" y2="110" stroke="#1d4ed8" stroke-width=".7" opacity=".3"/>
  <!-- right decorative -->
  <circle cx="858" cy="60" r="3" fill="#22c55e" opacity=".6"/>
  <circle cx="858" cy="110" r="3" fill="#3b82f6" opacity=".6"/>
  <circle cx="858" cy="160" r="3" fill="#f59e0b" opacity=".6"/>
  <line x1="858" y1="60" x2="858" y2="160" stroke="#22c55e" stroke-width=".7" opacity=".3" stroke-dasharray="4 3" class="dk"/>
  <!-- live dots -->
  <circle class="p1 bk" cx="80" cy="28" r="4" fill="#22c55e"/>
  <text x="90" y="32" font-family="monospace" font-size="9" fill="#22c55e" opacity=".8" class="t1">LIVE · 20 TPS</text>
  <circle class="p2 bk" cx="730" cy="28" r="4" fill="#3b82f6"/>
  <text x="740" y="32" font-family="monospace" font-size="9" fill="#3b82f6" opacity=".8" class="t1">15 SERVICES HEALTHY</text>
  <circle class="p3 bk" cx="840" cy="28" r="4" fill="#ef4444"/>
  <!-- main title -->
  <text class="t2" x="450" y="102" text-anchor="middle" font-family="monospace" font-size="54" font-weight="700" letter-spacing="6" fill="#3b82f6">FRAUD</text>
  <text class="t2" x="450" y="102" text-anchor="middle" font-family="monospace" font-size="54" font-weight="700" letter-spacing="6" fill="#e0f0ff" dx="168">STREAM</text>
  <!-- subtitle -->
  <text class="t3" x="450" y="135" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="4" fill="#475569">REAL-TIME UPI FRAUD DETECTION · END-TO-END MLOPS</text>
  <!-- stat pills -->
  <rect class="t4" x="188" y="155" width="110" height="22" rx="4" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width=".5"/>
  <text class="t4" x="243" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e">AUC 0.963</text>
  <rect class="t4" x="310" y="155" width="110" height="22" rx="4" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width=".5"/>
  <text class="t4" x="365" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">P95 42ms</text>
  <rect class="t4" x="432" y="155" width="110" height="22" rx="4" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width=".5"/>
  <text class="t4" x="487" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">XGBoost 2.1</text>
  <rect class="t4" x="554" y="155" width="110" height="22" rx="4" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width=".5"/>
  <text class="t4" x="609" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">Drift Auto-Retrain</text>
  <!-- bottom bar -->
  <rect x="0" y="208" width="900" height="2" fill="rgba(59,130,246,0.25)"/>
  <text x="450" y="218" text-anchor="middle" font-family="monospace" font-size="8" fill="#334155" letter-spacing="3">Python 53% · TypeScript 38% · 15 Docker Services · MIT License</text>
</svg>