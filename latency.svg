<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <style>
      @keyframes growBar{0%{width:0}100%{width:var(--w)}}
      @keyframes fdL{0%{opacity:0}100%{opacity:1}}
      .lb1{animation:fdL .3s .3s both}
      .lb2{animation:fdL .3s .55s both}
      .lb3{animation:fdL .3s .8s both}
      .lb4{animation:fdL .3s 1.05s both}
      .lb5{animation:fdL .3s 1.3s both}
    </style>
  </defs>
  <rect width="900" height="160" fill="#070d18"/>
  <text x="20" y="22" font-family="monospace" font-size="10" fill="#475569" letter-spacing="2">INFERENCE LATENCY BREAKDOWN  ·  MacBook Pro M2 · 2 uvicorn workers</text>
  <!-- labels -->
  <text class="lb1" x="145" y="56" text-anchor="end" font-family="monospace" font-size="10" fill="#64748b">Redis velocity</text>
  <text class="lb2" x="145" y="86" text-anchor="end" font-family="monospace" font-size="10" fill="#64748b">XGBoost infer</text>
  <text class="lb3" x="145" y="116" text-anchor="end" font-family="monospace" font-size="10" fill="#64748b">SHAP explain</text>
  <text class="lb4" x="145" y="146" text-anchor="end" font-family="monospace" font-size="10" fill="#64748b">Rule engine</text>
  <!-- bars  scale: 500px = 80ms → 6.25px/ms -->
  <!-- Redis 5ms = 31px -->
  <rect class="lb1" x="155" y="44" width="31" height="18" rx="3" fill="#14b8a6" opacity=".8"/>
  <text class="lb1" x="193" y="57" font-family="monospace" font-size="9" fill="#5eead4">5ms</text>
  <!-- XGBoost 20ms = 125px -->
  <rect class="lb2" x="155" y="74" width="125" height="18" rx="3" fill="#ef4444" opacity=".8"/>
  <text class="lb2" x="286" y="87" font-family="monospace" font-size="9" fill="#fca5a5">20ms</text>
  <!-- SHAP 10ms = 62px -->
  <rect class="lb3" x="155" y="104" width="62" height="18" rx="3" fill="#f59e0b" opacity=".8"/>
  <text class="lb3" x="224" y="117" font-family="monospace" font-size="9" fill="#fcd34d">10ms</text>
  <!-- Rule 1ms = 6px -->
  <rect class="lb4" x="155" y="134" width="6" height="18" rx="2" fill="#22c55e" opacity=".8"/>
  <text class="lb4" x="168" y="147" font-family="monospace" font-size="9" fill="#86efac">1ms</text>
  <!-- P50 line at 36ms = 155+225=380 -->
  <line class="lb5" x1="380" y1="34" x2="380" y2="155" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="lb5" x="380" y="31" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa">p50 36ms</text>
  <!-- P95 line at 80ms = 655 -->
  <line class="lb5" x1="655" y1="34" x2="655" y2="155" stroke="#ef4444" stroke-width=".8" stroke-dasharray="3 4" opacity=".6"/>
  <text class="lb5" x="655" y="31" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444" opacity=".8">p95 target 80ms</text>
  <!-- p99 at 89ms = 710 -->
  <line class="lb5" x1="710" y1="34" x2="710" y2="155" stroke="#f59e0b" stroke-width=".7" stroke-dasharray="2 4" opacity=".5"/>
  <text class="lb5" x="710" y="31" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b" opacity=".7">p99 89ms</text>
  <!-- x-axis -->
  <line x1="155" y1="155" x2="780" y2="155" stroke="#1e293b" stroke-width=".5"/>
  <text x="155" y="155" font-family="monospace" font-size="8" fill="#334155">0</text>
  <text x="343" y="155" font-family="monospace" font-size="8" fill="#334155">30ms</text>
  <text x="467" y="155" font-family="monospace" font-size="8" fill="#334155">50ms</text>
  <text x="655" y="155" font-family="monospace" font-size="8" fill="#334155">80ms</text>
</svg>