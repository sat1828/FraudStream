<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @keyframes fd2{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
      @keyframes flow2{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
      @keyframes pill{0%,100%{opacity:.7}50%{opacity:1}}
      .n1{animation:fd2 .4s .05s both}
      .n2{animation:fd2 .4s .2s both}
      .n3{animation:fd2 .4s .35s both}
      .n4{animation:fd2 .4s .5s both}
      .n5{animation:fd2 .4s .65s both}
      .n6{animation:fd2 .4s .8s both}
      .n7{animation:fd2 .4s .95s both}
      .n8{animation:fd2 .4s 1.1s both}
      .fw{stroke-dasharray:6 3;animation:flow2 .8s linear infinite}
      .pl{animation:pill 1.8s infinite}
    </style>
  </defs>
  <rect width="900" height="280" fill="#070d18"/>
  <!-- row labels -->
  <text x="14" y="68" font-family="monospace" font-size="8" fill="#334155" letter-spacing="1.5">TRAIN</text>
  <text x="14" y="148" font-family="monospace" font-size="8" fill="#334155" letter-spacing="1.5">SERVE</text>
  <text x="14" y="228" font-family="monospace" font-size="8" fill="#334155" letter-spacing="1.5">DRIFT</text>
  <!-- TRAIN ROW -->
  <g class="n1"><rect x="55" y="46" width="140" height="44" rx="6" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width=".7"/>
    <text x="125" y="65" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#93c5fd">Synthetic Gen</text>
    <text x="125" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">Faker · 100K txns</text></g>
  <line x1="195" y1="68" x2="225" y2="68" stroke="#3b82f6" stroke-width="1.2" class="fw"/>
  <g class="n2"><rect x="225" y="46" width="140" height="44" rx="6" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width=".7"/>
    <text x="295" y="65" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#93c5fd">XGBoost Train</text>
    <text x="295" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">scale_pos_weight=40</text></g>
  <line x1="365" y1="68" x2="395" y2="68" stroke="#3b82f6" stroke-width="1.2" class="fw"/>
  <g class="n3"><rect x="395" y="46" width="140" height="44" rx="6" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.3)" stroke-width=".7"/>
    <text x="465" y="65" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#5eead4">MLflow Log</text>
    <text x="465" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#14b8a6">AUC · SHAP · artifacts</text></g>
  <line x1="535" y1="68" x2="565" y2="68" stroke="#14b8a6" stroke-width="1.2" class="fw"/>
  <g class="n4"><rect x="565" y="46" width="140" height="44" rx="6" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width=".7"/>
    <text x="635" y="65" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#86efac">Auto-Promote</text>
    <text x="635" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">if AUC &gt; 0.90 → Production</text></g>
  <!-- SERVE ROW -->
  <g class="n5"><rect x="55" y="126" width="140" height="44" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width=".7"/>
    <text x="125" y="145" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fca5a5">Redis / Feast</text>
    <text x="125" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">20 velocity features</text></g>
  <line x1="195" y1="148" x2="225" y2="148" stroke="#ef4444" stroke-width="1.2" class="fw"/>
  <g class="n6"><rect x="225" y="126" width="140" height="44" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width=".7"/>
    <text x="295" y="145" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fca5a5">XGBoost Infer</text>
    <text x="295" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">predict_proba ≈20ms</text></g>
  <line x1="365" y1="148" x2="395" y2="148" stroke="#ef4444" stroke-width="1.2" class="fw"/>
  <g class="n7"><rect x="395" y="126" width="140" height="44" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width=".7"/>
    <text x="465" y="145" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fca5a5">SHAP Explain</text>
    <text x="465" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">per-feature waterfall</text></g>
  <line x1="535" y1="148" x2="565" y2="148" stroke="#ef4444" stroke-width="1.2" class="fw"/>
  <g class="n8"><rect x="565" y="126" width="140" height="44" rx="6" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.4)" stroke-width=".7"/>
    <text x="635" y="145" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fca5a5">Decision</text>
    <text x="635" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">ALLOW / REVIEW / BLOCK</text></g>
  <!-- decision badges -->
  <g class="pl"><rect x="725" y="134" width="46" height="18" rx="3" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width=".5"/>
    <text x="748" y="147" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">≥0.50</text></g>
  <g class="pl"><rect x="725" y="154" width="46" height="18" rx="3" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width=".5"/>
    <text x="748" y="167" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b">≥0.30</text></g>
  <!-- DRIFT ROW -->
  <g class="n1"><rect x="55" y="206" width="140" height="44" rx="6" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width=".7"/>
    <text x="125" y="225" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fcd34d">Evidently AI</text>
    <text x="125" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b">DataDriftPreset / 500</text></g>
  <line x1="195" y1="228" x2="225" y2="228" stroke="#f59e0b" stroke-width="1.2" class="fw"/>
  <g class="n2"><rect x="225" y="206" width="140" height="44" rx="6" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width=".7"/>
    <text x="295" y="225" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fcd34d">Drift Score</text>
    <text x="295" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b">drifted / total features</text></g>
  <line x1="365" y1="228" x2="395" y2="228" stroke="#f59e0b" stroke-width="1.2" class="fw"/>
  <g class="n3"><rect x="395" y="206" width="140" height="44" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width=".7"/>
    <text x="465" y="225" text-anchor="middle" font-family="monospace" font-size="10" font-weight="500" fill="#fca5a5">Celery Task</text>
    <text x="465" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">score &gt;10% → retrain</text></g>
  <!-- retrain loop arrow back -->
  <path d="M465 206 L465 185 Q465 170 380 170 Q280 170 195 170 Q100 170 100 190 L100 206" stroke="#f59e0b" stroke-width=".8" fill="none" stroke-dasharray="5 3" class="fw"/>
  <text x="300" y="165" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b" opacity=".8">triggers new training run</text>
  <!-- bottom -->
  <text x="450" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155" letter-spacing="1.5">BLOCK ≥ 0.50 · REVIEW ≥ 0.30 · ALLOW &lt; 0.30  ·  DRIFT_THRESHOLD=0.10  ·  WINDOW=500</text>
</svg>